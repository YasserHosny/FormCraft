<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Teal rounded-square background -->
  <rect width="32" height="32" rx="7" fill="#00897B"/>

  <!-- White document / form card -->
  <rect x="6" y="4" width="20" height="24" rx="2.5" fill="#FFFFFF"/>

  <!-- Form field lines (teal, representing form inputs) -->
  <rect x="9" y="9"  width="14" height="2.2" rx="1.1" fill="#00897B" opacity="0.75"/>
  <rect x="9" y="14" width="14" height="2.2" rx="1.1" fill="#00897B" opacity="0.75"/>
  <rect x="9" y="19" width="9"  height="2.2" rx="1.1" fill="#00897B" opacity="0.75"/>

  <!-- Amber accent — small checkmark badge at bottom-right -->
  <circle cx="24" cy="24" r="5.5" fill="#FFC107"/>
  <polyline points="21.5,24 23.2,25.8 26.5,22.2"
            fill="none" stroke="#FFFFFF" stroke-width="1.8"
            stroke-linecap="round" stroke-linejoin="round"/>
</svg>
