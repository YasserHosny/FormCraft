<h2 mat-dialog-title>{{ 'templates.cloneConfirmTitle' | translate }}</h2>
<mat-dialog-content>
  <p>{{ 'templates.cloneConfirmMessage' | translate }}</p>
  <mat-form-field appearance="outline" class="full-width">
    <mat-label>{{ 'templates.name' | translate }}</mat-label>
    <input matInput [formControl]="nameControl" />
  </mat-form-field>
  <p *ngIf="errorMessage" class="error">{{ errorMessage }}</p>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()">{{ 'common.cancel' | translate }}</button>
  <button mat-raised-button color="primary" (click)="onClone()" [disabled]="form.invalid || saving">
    {{ 'templates.clone' | translate }}
  </button>
</mat-dialog-actions>
