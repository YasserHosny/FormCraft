<mat-toolbar color="primary">
  <span>{{ 'templates.title' | translate }}</span>
  <span class="spacer"></span>
  <button mat-raised-button (click)="createTemplate()">
    {{ 'templates.create' | translate }}
  </button>
</mat-toolbar>

<div class="template-grid">
  <!--
    The entire card is clickable → opens the designer.
    Action buttons stop propagation to prevent double-navigation.
  -->
  <mat-card *ngFor="let template of templates" class="template-card"
            (click)="openDesigner(template)">
    <mat-card-header>
      <mat-card-title>{{ template.name }}</mat-card-title>
      <mat-card-subtitle>{{ template.status }} &middot; v{{ template.version }}</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <p>{{ template.description }}</p>
    </mat-card-content>
    <mat-card-actions>
      <!-- stopPropagation on every action so the card click doesn't also fire -->
      <button mat-button (click)="$event.stopPropagation(); openDesigner(template)">
        {{ 'designer.title' | translate }}
      </button>
      <button mat-icon-button
              (click)="$event.stopPropagation(); cloneTemplate(template)"
              [matTooltip]="'templates.clone' | translate">
        <mat-icon>content_copy</mat-icon>
      </button>
      <ng-container *ngIf="template.status === 'draft'">
        <button mat-button color="accent"
                (click)="$event.stopPropagation(); publish(template)">
          {{ 'templates.publish' | translate }}
        </button>
      </ng-container>
      <ng-container *ngIf="template.status === 'published'">
        <button mat-button color="primary"
                (click)="$event.stopPropagation(); createNewVersion(template)">
          {{ 'templates.newVersion' | translate }}
        </button>
      </ng-container>
      <button mat-icon-button color="warn"
              (click)="$event.stopPropagation(); deleteTemplate(template)"
              [matTooltip]="'common.delete' | translate">
        <mat-icon>delete</mat-icon>
      </button>
    </mat-card-actions>
  </mat-card>
</div>
