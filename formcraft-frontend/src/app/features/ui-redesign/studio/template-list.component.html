<fc-page-header [title]="'templates.list_title' | translate" [subtitle]="headerSubtitle">
  <div actions>
    <button class="fc-btn outline" type="button" (click)="exportTemplates()">
      <mat-icon>file_download</mat-icon>{{ 'templates.btn_export' | translate }}
    </button>
    <button class="fc-btn outline" type="button" (click)="importPdf()">
      <mat-icon>upload_file</mat-icon>{{ 'templates.btn_import_pdf' | translate }}
    </button>
    <button class="fc-btn primary" type="button" (click)="createTemplate()">
      <mat-icon>add</mat-icon>{{ 'templates.btn_create' | translate }}
    </button>
  </div>
</fc-page-header>

<!-- Filter bar -->
<div class="filter-bar">
  <div class="fc-search-box">
    <mat-icon>search</mat-icon>
    <input
      [(ngModel)]="search"
      [placeholder]="'templates.search_placeholder' | translate"
      [attr.aria-label]="'templates.search_placeholder' | translate"
    />
  </div>
  <label class="fc-filter-pill">
    <span class="label-key">{{ 'templates.status_label' | translate }}</span>
    <select [(ngModel)]="activeTab" [attr.aria-label]="'templates.status_label' | translate">
      <option *ngFor="let tab of statusTabs" [value]="tab.key">{{ tab.labelKey | translate }}</option>
    </select>
    <mat-icon>expand_more</mat-icon>
  </label>
  <label class="fc-filter-pill">
    <span class="label-key">{{ 'templates.dept_label' | translate }}</span>
    <select [(ngModel)]="category" [attr.aria-label]="'templates.dept_label' | translate">
      <option *ngFor="let c of categories" [value]="c.key">{{ c.labelKey | translate }}</option>
    </select>
    <mat-icon>expand_more</mat-icon>
  </label>
  <span class="grow"></span>
  <div class="view-toggle">
    <button class="fc-icon-btn" type="button" [class.active]="viewMode === 'grid'" (click)="viewMode = 'grid'"><mat-icon>grid_view</mat-icon></button>
    <button class="fc-icon-btn" type="button" [class.active]="viewMode === 'list'" (click)="viewMode = 'list'"><mat-icon>view_list</mat-icon></button>
  </div>
</div>

<!-- Status tabs -->
<div class="status-tabs">
  <div *ngFor="let tab of statusTabs"
       class="status-tab"
       [class.active]="activeTab === tab.key"
       (click)="activeTab = tab.key">
    {{ tab.labelKey | translate }}
    <span class="tab-count" [class.active]="activeTab === tab.key">{{ tab.count }}</span>
  </div>
</div>

<div class="state-panel" *ngIf="loading">{{ 'templates.loading' | translate }}</div>
<div class="state-panel error" *ngIf="!loading && error">{{ error }}</div>
<div class="state-panel" *ngIf="!loading && !error && filteredTemplates.length === 0">{{ 'templates.empty' | translate }}</div>

<!-- Template grid -->
<div class="template-grid" [class.list-view]="viewMode === 'list'" *ngIf="!loading && !error && filteredTemplates.length > 0">
  <button class="template-card" type="button" *ngFor="let t of filteredTemplates" (click)="openTemplate(t)">
    <div class="card-preview">
      <!--
        SVG mini-canvas — renders actual element positions (x_mm / y_mm / width_mm / height_mm)
        from the first page in a 210 × 130 mm viewBox (natural A4 coordinates, top portion).
        Falls back to a generic paper skeleton when the template has no positional data.
      -->
      <img
        *ngIf="t.thumbnailAsset; else generatedPreview"
        class="template-thumbnail"
        [src]="t.thumbnailAsset"
        [alt]="t.name"
        loading="lazy"
      />

      <ng-template #generatedPreview>
      <svg class="preview-svg"
           viewBox="0 0 210 130"
           xmlns="http://www.w3.org/2000/svg"
           preserveAspectRatio="xMidYMid meet"
           aria-hidden="true">
        <!-- Page background -->
        <rect width="210" height="130" fill="#F8F9FB" rx="3"/>
        <!-- Left margin guide -->
        <line x1="18" y1="0" x2="18" y2="130" stroke="#E4E7F0" stroke-width="0.4"/>

        <!-- Real layout: element rects from pages[0].elements -->
        <ng-container *ngIf="(t.previewElements?.length ?? 0) > 0; else genericPaper">
          <rect *ngFor="let el of t.previewElements"
                [attr.x]="el.x_mm"
                [attr.y]="el.y_mm"
                [attr.width]="el.width_mm"
                [attr.height]="el.height_mm"
                [attr.fill]="elementFill(el.type)"
                rx="1.5"
                opacity="0.82"/>
        </ng-container>

        <!-- Generic paper skeleton (no element data available) -->
        <ng-template #genericPaper>
          <rect x="20" y="11" width="120" height="6"   fill="#C7D2FE" rx="1.5"/>
          <rect x="20" y="21" width="80"  height="3.5" fill="#E0E3EF" rx="1"/>
          <rect x="20" y="31" width="168" height="9"   fill="#DDE1F0" rx="1.5" opacity="0.65"/>
          <rect x="20" y="45" width="80"  height="9"   fill="#DDE1F0" rx="1.5" opacity="0.65"/>
          <rect x="108" y="45" width="80" height="9"   fill="#DDE1F0" rx="1.5" opacity="0.65"/>
          <rect x="20" y="59" width="168" height="9"   fill="#DDE1F0" rx="1.5" opacity="0.65"/>
          <rect x="20" y="73" width="168" height="9"   fill="#DDE1F0" rx="1.5" opacity="0.65"/>
          <rect x="20" y="87" width="50"  height="9"   fill="#DDE1F0" rx="1.5" opacity="0.65"/>
          <rect x="78" y="87" width="50"  height="9"   fill="#DDE1F0" rx="1.5" opacity="0.65"/>
          <rect x="136" y="87" width="52" height="9"   fill="#DDE1F0" rx="1.5" opacity="0.65"/>
          <rect x="20" y="101" width="168" height="9"  fill="#DDE1F0" rx="1.5" opacity="0.65"/>
        </ng-template>
      </svg>
      </ng-template>

      <div class="preview-status">
        <fc-status-chip [status]="t.status"></fc-status-chip>
      </div>
      <div class="preview-meta">
        {{ t.code }} · {{ t.pages }}
        {{ t.pages > 1 ? ('templates.page_plural' | translate) : ('templates.page_singular' | translate) }}
      </div>
    </div>
    <div class="card-body">
      <div class="card-title">{{ t.name }}</div>
      <div class="card-meta">
        <span>{{ t.dept | translate }}</span>
        <span>·</span>
        <span class="fc-num">{{ t.version }}</span>
      </div>
      <div class="card-footer">
        <div class="author-info">
          <fc-avatar [name]="t.by" size="sm" [color]="t.color"></fc-avatar>
          <span class="author-name">{{ t.by }}</span>
          <span class="updated">· {{ t.updated }}</span>
        </div>
        <span class="submissions" *ngIf="t.submissions > 0">
          <mat-icon>task_alt</mat-icon>
          <span class="fc-num">{{ formatSubmissions(t.submissions) }}</span>
        </span>
      </div>
      <div class="card-actions" (click)="onCardAction($event)">
        <button class="fc-card-btn" type="button" (click)="openTemplate(t)"
                [matTooltip]="'templates.open_designer' | translate">
          <mat-icon>brush</mat-icon>
        </button>
        <button class="fc-card-btn" type="button" (click)="cloneTemplate($event, t)"
                [matTooltip]="'templates.tooltip_clone' | translate">
          <mat-icon>content_copy</mat-icon>
        </button>
        <button class="fc-card-btn accent" type="button" *ngIf="t.status === 'draft'"
                (click)="publishTemplate($event, t)"
                [matTooltip]="'templates.tooltip_publish' | translate">
          <mat-icon>publish</mat-icon>
        </button>
        <button class="fc-card-btn primary" type="button" *ngIf="t.status === 'published'"
                (click)="createNewVersion($event, t)"
                [matTooltip]="'templates.tooltip_new_version' | translate">
          <mat-icon>add_circle_outline</mat-icon>
        </button>
        <button class="fc-card-btn" type="button" [matMenuTriggerFor]="cardMenu"
                (click)="onCardAction($event)"
                [matTooltip]="'templates.tooltip_more' | translate">
          <mat-icon>more_vert</mat-icon>
        </button>
        <mat-menu #cardMenu="matMenu">
          <button mat-menu-item (click)="deleteTemplate($event, t)">
            <mat-icon color="warn">delete</mat-icon>
            {{ 'templates.delete_action' | translate }}
          </button>
        </mat-menu>
      </div>
    </div>
  </button>
</div>

<!-- FAB -->
<button class="fc-fab" type="button" (click)="createTemplate()">
  <mat-icon>add</mat-icon>
  {{ 'templates.btn_fab' | translate }}
</button>
