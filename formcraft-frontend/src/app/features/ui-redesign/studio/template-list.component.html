<fc-page-header title="النماذج" [subtitle]="headerSubtitle">
  <div actions>
    <button class="fc-btn outline" type="button" (click)="exportTemplates()"><mat-icon>file_download</mat-icon>تصدير</button>
    <button class="fc-btn outline" type="button" (click)="importPdf()"><mat-icon>upload_file</mat-icon>استيراد PDF</button>
    <button class="fc-btn primary" type="button" (click)="createTemplate()"><mat-icon>add</mat-icon>إنشاء نموذج جديد</button>
  </div>
</fc-page-header>

<!-- Filter bar -->
<div class="filter-bar">
  <div class="fc-search-box">
    <mat-icon>search</mat-icon>
    <input
      [(ngModel)]="search"
      placeholder="ابحث في النماذج بالاسم أو الرمز أو الإدارة..."
      aria-label="البحث في النماذج"
    />
  </div>
  <label class="fc-filter-pill">
    <span class="label-key">الحالة:</span>
    <select [(ngModel)]="activeTab" aria-label="تصفية حسب الحالة">
      <option *ngFor="let tab of statusTabs" [value]="tab.key">{{ tab.label }}</option>
    </select>
    <mat-icon>expand_more</mat-icon>
  </label>
  <label class="fc-filter-pill">
    <span class="label-key">الإدارة:</span>
    <select [(ngModel)]="category" aria-label="تصفية حسب الإدارة">
      <option *ngFor="let c of categories" [value]="c.key">{{ c.label }}</option>
    </select>
    <mat-icon>expand_more</mat-icon>
  </label>
  <span class="grow"></span>
  <div class="view-toggle">
    <button class="fc-icon-btn" type="button" [class.active]="viewMode === 'grid'" (click)="viewMode = 'grid'"><mat-icon>grid_view</mat-icon></button>
    <button class="fc-icon-btn" type="button" [class.active]="viewMode === 'list'" (click)="viewMode = 'list'"><mat-icon>view_list</mat-icon></button>
  </div>
</div>

<!-- Status tabs -->
<div class="status-tabs">
  <div *ngFor="let tab of statusTabs"
       class="status-tab"
       [class.active]="activeTab === tab.key"
       (click)="activeTab = tab.key">
    {{ tab.label }}
    <span class="tab-count" [class.active]="activeTab === tab.key">{{ tab.count }}</span>
  </div>
</div>

<div class="state-panel" *ngIf="loading">جاري تحميل النماذج...</div>
<div class="state-panel error" *ngIf="!loading && error">{{ error }}</div>
<div class="state-panel" *ngIf="!loading && !error && filteredTemplates.length === 0">لا توجد نماذج مطابقة.</div>

<!-- Template grid -->
<div class="template-grid" [class.list-view]="viewMode === 'list'" *ngIf="!loading && !error && filteredTemplates.length > 0">
  <button class="template-card" type="button" *ngFor="let t of filteredTemplates" (click)="openTemplate(t)">
    <div class="card-preview">
      <div class="paper-mock">
        <div class="line title-line"></div>
        <div class="line short-line"></div>
        <div class="spacer"></div>
        <div class="field-row two-col">
          <div class="field-mock"></div>
          <div class="field-mock"></div>
        </div>
        <div class="field-mock"></div>
        <div class="field-row three-col">
          <div class="field-mock"></div>
          <div class="field-mock"></div>
          <div class="field-mock"></div>
        </div>
      </div>
      <div class="preview-status">
        <fc-status-chip [status]="t.status"></fc-status-chip>
      </div>
      <div class="preview-meta">{{ t.code }} · {{ t.pages }} {{ t.pages > 1 ? 'صفحات' : 'صفحة' }}</div>
    </div>
    <div class="card-body">
      <div class="card-title">{{ t.name }}</div>
      <div class="card-meta">
        <span>{{ t.dept }}</span>
        <span>·</span>
        <span class="fc-num">{{ t.version }}</span>
      </div>
      <div class="card-footer">
        <div class="author-info">
          <fc-avatar [name]="t.by" size="sm" [color]="t.color"></fc-avatar>
          <span class="author-name">{{ t.by }}</span>
          <span class="updated">· {{ t.updated }}</span>
        </div>
        <span class="submissions" *ngIf="t.submissions > 0">
          <mat-icon>task_alt</mat-icon>
          <span class="fc-num">{{ formatSubmissions(t.submissions) }}</span>
        </span>
      </div>
      <div class="card-actions" (click)="onCardAction($event)">
        <button class="fc-card-btn" type="button" (click)="openTemplate(t)" matTooltip="فتح المصمم">
          <mat-icon>brush</mat-icon>
        </button>
        <button class="fc-card-btn" type="button" (click)="cloneTemplate($event, t)" matTooltip="استنساخ">
          <mat-icon>content_copy</mat-icon>
        </button>
        <button class="fc-card-btn accent" type="button" *ngIf="t.status === 'draft'" (click)="publishTemplate($event, t)" matTooltip="نشر">
          <mat-icon>publish</mat-icon>
        </button>
        <button class="fc-card-btn primary" type="button" *ngIf="t.status === 'published'" (click)="createNewVersion($event, t)" matTooltip="إصدار جديد">
          <mat-icon>add_circle_outline</mat-icon>
        </button>
        <button class="fc-card-btn" type="button" [matMenuTriggerFor]="cardMenu" (click)="onCardAction($event)" matTooltip="المزيد">
          <mat-icon>more_vert</mat-icon>
        </button>
        <mat-menu #cardMenu="matMenu">
          <button mat-menu-item (click)="deleteTemplate($event, t)">
            <mat-icon color="warn">delete</mat-icon>
            حذف النموذج
          </button>
        </mat-menu>
      </div>
    </div>
  </button>
</div>

<!-- FAB -->
<button class="fc-fab" type="button" (click)="createTemplate()">
  <mat-icon>add</mat-icon>
  نموذج جديد
</button>
