<header class="fc-toolbar">
  <button class="fc-toolbar-btn fc-menu-btn"
          type="button"
          (click)="menuRequested.emit()"
          [matTooltip]="'nav.menu' | translate">
    <mat-icon>menu</mat-icon>
  </button>

  <!-- Org logo -->
  <img *ngIf="orgLogoUrl" [src]="orgLogoUrl" alt="Org logo" class="org-logo" />

  <!-- Brand -->
  <div class="brand-logo">FC</div>
  <span class="brand-name">FormCraft</span>
  <span class="brand-sep"></span>

  <!-- Mode Tabs -->
  <nav class="fc-mode-tabs">
    <a *ngFor="let tab of tabs"
       class="fc-mode-tab"
       [class.active]="activeMode === tab.key"
       [routerLink]="tab.route"
       [matTooltip]="tab.labelKey | translate"
       matTooltipPosition="below">
      <mat-icon>{{ tab.icon }}</mat-icon>
      <span>{{ tab.labelKey | translate }}</span>
    </a>
  </nav>

  <span class="spacer"></span>

  <!-- Global Search (real component) -->
  <fc-global-search-bar class="fc-toolbar-search-wrap"></fc-global-search-bar>

  <!-- Theme Switch — Classic badge -->
  <a class="fc-classic-badge" (click)="switchToClassic()" [title]="'nav.classic_theme' | translate">
    <mat-icon>history</mat-icon>
    <span>{{ 'nav.classic_theme' | translate }}</span>
  </a>

  <!-- Help -->
  <button class="fc-toolbar-btn" type="button" [matMenuTriggerFor]="helpMenu"
          [matTooltip]="'common.help' | translate">
    <mat-icon>help_outline</mat-icon>
  </button>
  <mat-menu #helpMenu="matMenu">
    <button mat-menu-item (click)="switchToClassic()">
      <mat-icon>history</mat-icon>
      {{ 'nav.open_classic' | translate }}
    </button>
    <button mat-menu-item disabled>
      <mat-icon>keyboard</mat-icon>
      {{ 'nav.keyboard_shortcuts' | translate }}
    </button>
  </mat-menu>

  <!-- My Feedback (non-admin only) -->
  <a class="fc-toolbar-btn" routerLink="/ui/my-feedback"
     *ngIf="userRole && userRole !== 'admin'"
     [matTooltip]="'nav.my_feedback' | translate">
    <mat-icon>feedback</mat-icon>
    <span class="fc-badge-dot" *ngIf="unreadCount > 0">{{ unreadCount }}</span>
  </a>

  <!-- Notifications -->
  <button class="fc-toolbar-btn" type="button"
          [matTooltip]="'nav.notifications' | translate">
    <mat-icon>notifications</mat-icon>
  </button>

  <!-- User Chip -->
  <button class="fc-user-chip" type="button" [matMenuTriggerFor]="userMenu">
    <div class="avatar">{{ user.initials }}</div>
    <div class="user-info">
      <span class="name">{{ user.name }}</span>
      <span class="role">{{ user.role | translate }}</span>
    </div>
    <mat-icon class="expand">expand_more</mat-icon>
  </button>

  <mat-menu #userMenu="matMenu">
    <button mat-menu-item routerLink="/ui/profile">
      <mat-icon>person</mat-icon>
      {{ 'nav.profile' | translate }}
    </button>
    <button mat-menu-item (click)="toggleLanguage()">
      <mat-icon>language</mat-icon>
      {{ currentLang === 'ar' ? 'English' : 'العربية' }}
    </button>
    <mat-divider></mat-divider>
    <button mat-menu-item (click)="switchToClassic()">
      <mat-icon>history</mat-icon>
      {{ 'nav.classic_theme' | translate }}
    </button>
    <button mat-menu-item (click)="logout()">
      <mat-icon>logout</mat-icon>
      {{ 'nav.logout' | translate }}
    </button>
  </mat-menu>
</header>
