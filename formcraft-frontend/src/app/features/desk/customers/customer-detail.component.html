<div class="customer-detail-container">
  <div class="header">
    <button mat-icon-button (click)="cancel()">
      <mat-icon>arrow_back</mat-icon>
    </button>
    <h2>{{ isNew ? 'New Customer' : 'Customer Details' }}</h2>
  </div>

  <mat-spinner *ngIf="loading" diameter="40"></mat-spinner>

  <mat-card *ngIf="!loading">
    <mat-card-content>
      <form class="customer-form">
        <div class="form-row">
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Arabic Name</mat-label>
            <input matInput [(ngModel)]="formData.name_ar" name="name_ar" required>
          </mat-form-field>
        </div>

        <div class="form-row">
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>English Name</mat-label>
            <input matInput [(ngModel)]="formData.name_en" name="name_en">
          </mat-form-field>
        </div>

        <div class="form-row two-col">
          <mat-form-field appearance="outline">
            <mat-label>Identifier Type</mat-label>
            <mat-select [(ngModel)]="formData.identifier_type" name="identifier_type" required>
              <mat-option *ngFor="let type of identifierTypes" [value]="type.value">
                {{ type.label }}
              </mat-option>
            </mat-select>
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Identifier</mat-label>
            <input matInput [(ngModel)]="formData.identifier" name="identifier" required>
          </mat-form-field>
        </div>

        <div class="form-row two-col">
          <mat-form-field appearance="outline">
            <mat-label>Phone</mat-label>
            <input matInput [(ngModel)]="formData.contact_phone" name="contact_phone">
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Email</mat-label>
            <input matInput [(ngModel)]="formData.contact_email" name="contact_email" type="email">
          </mat-form-field>
        </div>

        <div class="form-row">
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Address</mat-label>
            <textarea matInput [(ngModel)]="formData.address" name="address" rows="3"></textarea>
          </mat-form-field>
        </div>
      </form>
    </mat-card-content>

    <mat-card-actions align="end">
      <button mat-button (click)="cancel()">Cancel</button>
      <button mat-raised-button color="primary" (click)="save()" [disabled]="saving">
        {{ saving ? 'Saving...' : 'Save' }}
      </button>
    </mat-card-actions>
  </mat-card>
</div>
