<div class="customer-list-container">
  <div class="header">
    <h2>Customers</h2>
    <button mat-raised-button color="primary" (click)="addCustomer()">
      <mat-icon>add</mat-icon> Add Customer
    </button>
  </div>

  <div class="filter-bar">
    <mat-form-field appearance="outline" class="search-field">
      <mat-label>Search</mat-label>
      <input matInput [(ngModel)]="searchQuery" (ngModelChange)="onSearchChange($event)" placeholder="Search by name or identifier">
      <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>
  </div>

  <div class="table-container">
    <mat-spinner *ngIf="loading" diameter="40"></mat-spinner>

    <table mat-table [dataSource]="customers" *ngIf="!loading" class="customer-table">
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Name</th>
        <td mat-cell *matCellDef="let customer">
          <div class="name-cell">
            <span class="name-ar">{{ customer.name_ar }}</span>
            <span *ngIf="customer.name_en" class="name-en">{{ customer.name_en }}</span>
          </div>
        </td>
      </ng-container>

      <ng-container matColumnDef="identifier">
        <th mat-header-cell *matHeaderCellDef>Identifier</th>
        <td mat-cell *matCellDef="let customer">
          <span class="identifier">{{ customer.identifier }}</span>
          <mat-chip [color]="getStatusColor(customer.is_active)" selected *ngIf="!customer.is_active">
            Inactive
          </mat-chip>
        </td>
      </ng-container>

      <ng-container matColumnDef="contact">
        <th mat-header-cell *matHeaderCellDef>Contact</th>
        <td mat-cell *matCellDef="let customer">
          <div class="contact-cell">
            <span *ngIf="customer.contact_phone">
              <mat-icon>phone</mat-icon> {{ customer.contact_phone }}
            </span>
            <span *ngIf="customer.contact_email">
              <mat-icon>email</mat-icon> {{ customer.contact_email }}
            </span>
          </div>
        </td>
      </ng-container>

      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let customer">
          <mat-chip [color]="getStatusColor(customer.is_active)" selected>
            {{ customer.is_active ? 'Active' : 'Inactive' }}
          </mat-chip>
        </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let customer">
          <button mat-icon-button (click)="viewCustomer(customer)" matTooltip="View">
            <mat-icon>visibility</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;" (click)="viewCustomer(row)"></tr>
    </table>

    <mat-paginator
      *ngIf="!loading && total > 0"
      [length]="total"
      [pageSize]="pageSize"
      [pageSizeOptions]="[10, 25, 50, 100]"
      [pageIndex]="page - 1"
      (page)="onPageChange($event)"
    ></mat-paginator>

    <div *ngIf="!loading && customers.length === 0" class="empty-state">
      <mat-icon>person_off</mat-icon>
      <p>No customers found</p>
    </div>
  </div>
</div>
