<div class="confirmation-page" [dir]="dir">
  <div class="confirmation-card">
    <mat-icon class="success-icon">check_circle</mat-icon>
    <h2>{{ 'publicPortal.submit' | translate }}</h2>

    <div class="reference-section">
      <span class="label">{{ 'publicPortal.referenceNumber' | translate }}</span>
      <span class="value">{{ referenceNumber }}</span>
    </div>

    <div *ngIf="emailConfirmationStatus" class="email-status">
      <span class="label">{{ 'publicPortal.emailConfirmationStatus' | translate }}</span>
      <span class="value">{{ emailConfirmationStatus }}</span>
    </div>

    <div *ngIf="pdfDownloadUrl" class="pdf-action">
      <a mat-raised-button [href]="pdfDownloadUrl" target="_blank" color="primary">
        {{ 'publicPortal.downloadPdf' | translate }}
      </a>
    </div>
  </div>
</div>
