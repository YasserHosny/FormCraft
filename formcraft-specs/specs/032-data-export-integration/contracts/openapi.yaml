openapi: 3.0.3
info:
  title: FormCraft Data Export & Integration API
  version: 0.1.0
  description: Admin submission export, recurring email exports, template package portability, integration credentials, and signed webhooks for F32.
servers:
  - url: /api
security:
  - bearerAuth: []

paths:
  /admin/export/preview:
    post:
      summary: Preview a submission export before direct download
      tags: [Data Export]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExportPreviewRequest"
      responses:
        "200":
          description: Export preview with count and rejection metadata if limits are exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportPreviewResponse"
        "403":
          description: Admin role required

  /admin/export/download:
    post:
      summary: Generate a direct-download submission export
      tags: [Data Export]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExportDownloadRequest"
      responses:
        "200":
          description: Export file stream
          content:
            text/csv:
              schema:
                type: string
                format: binary
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary
            application/json:
              schema:
                type: string
                format: binary
        "400":
          description: Invalid filters or format
        "413":
          description: Export exceeds allowed record count or file-size limit
        "403":
          description: Admin role required

  /admin/export/history:
    get:
      summary: List export request and recurring delivery history
      tags: [Data Export]
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: page_size
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
      responses:
        "200":
          description: Paginated export history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportHistoryResponse"

  /admin/export/schedules:
    get:
      summary: List recurring export schedules
      tags: [Data Export]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Export schedules
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportScheduleListResponse"
    post:
      summary: Create a recurring email export schedule
      tags: [Data Export]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExportScheduleCreate"
      responses:
        "201":
          description: Created schedule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportSchedule"
        "400":
          description: Invalid schedule

  /admin/export/schedules/{schedule_id}:
    patch:
      summary: Update a recurring export schedule
      tags: [Data Export]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ScheduleId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExportScheduleUpdate"
      responses:
        "200":
          description: Updated schedule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportSchedule"
    delete:
      summary: Disable a recurring export schedule
      tags: [Data Export]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ScheduleId"
      responses:
        "204":
          description: Schedule disabled

  /admin/export/schedules/{schedule_id}/run-now:
    post:
      summary: Run a recurring export schedule immediately
      tags: [Data Export]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ScheduleId"
      responses:
        "202":
          description: Export delivery queued or sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportDelivery"

  /templates/{template_id}/package:
    get:
      summary: Export a template as a .formcraft package
      tags: [Template Package]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/TemplateId"
      responses:
        "200":
          description: FormCraft package JSON
          content:
            application/vnd.formcraft.package+json:
              schema:
                $ref: "#/components/schemas/TemplatePackage"
        "403":
          description: Template access required

  /templates/package/import-review:
    post:
      summary: Validate a .formcraft package and return import review/remapping needs
      tags: [Template Package]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/vnd.formcraft.package+json:
            schema:
              $ref: "#/components/schemas/TemplatePackage"
      responses:
        "200":
          description: Import review
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PackageImportReview"
        "400":
          description: Invalid or unsupported package

  /templates/package/import:
    post:
      summary: Import a valid .formcraft package as new draft or new version
      tags: [Template Package]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PackageImportRequest"
      responses:
        "201":
          description: Imported template result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PackageImportResult"

  /admin/integrations/credentials:
    get:
      summary: List integration credentials
      tags: [Integrations]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Integration credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntegrationCredentialListResponse"
    post:
      summary: Create an integration credential and return the secret once
      tags: [Integrations]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IntegrationCredentialCreate"
      responses:
        "201":
          description: Created credential with one-time secret
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntegrationCredentialCreated"

  /admin/integrations/credentials/{credential_id}/rotate:
    post:
      summary: Rotate an integration credential and return the new secret once
      tags: [Integrations]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CredentialId"
      responses:
        "200":
          description: Rotated credential
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntegrationCredentialCreated"

  /admin/integrations/credentials/{credential_id}/revoke:
    post:
      summary: Revoke an integration credential immediately
      tags: [Integrations]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CredentialId"
      responses:
        "200":
          description: Revoked credential
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntegrationCredential"

  /admin/integrations/webhooks:
    get:
      summary: List webhook subscriptions
      tags: [Integrations]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Webhook subscriptions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookSubscriptionListResponse"
    post:
      summary: Create a signed webhook subscription
      tags: [Integrations]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookSubscriptionCreate"
      responses:
        "201":
          description: Created webhook subscription
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookSubscription"
        "400":
          description: Signing secret required or invalid URL

  /admin/integrations/webhooks/{webhook_id}:
    patch:
      summary: Update a webhook subscription
      tags: [Integrations]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/WebhookId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookSubscriptionUpdate"
      responses:
        "200":
          description: Updated webhook subscription
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookSubscription"

  /admin/integrations/webhooks/{webhook_id}/test:
    post:
      summary: Send a signed test webhook payload
      tags: [Integrations]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/WebhookId"
      responses:
        "202":
          description: Test delivery queued or attempted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookDelivery"

  /admin/integrations/webhooks/{webhook_id}/deliveries:
    get:
      summary: List webhook delivery logs with full payload previews for admins
      tags: [Integrations]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/WebhookId"
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: page_size
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
      responses:
        "200":
          description: Webhook deliveries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookDeliveryListResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    TemplateId:
      in: path
      name: template_id
      required: true
      schema:
        type: string
        format: uuid
    ScheduleId:
      in: path
      name: schedule_id
      required: true
      schema:
        type: string
        format: uuid
    CredentialId:
      in: path
      name: credential_id
      required: true
      schema:
        type: string
        format: uuid
    WebhookId:
      in: path
      name: webhook_id
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    ExportFilters:
      type: object
      properties:
        template_id:
          type: string
          format: uuid
        date_from:
          type: string
          format: date
        date_to:
          type: string
          format: date
        department_id:
          type: string
          format: uuid
        branch_id:
          type: string
          format: uuid
        operator_id:
          type: string
          format: uuid
        status:
          type: string

    ExportPreviewRequest:
      type: object
      required: [filters, format, scope]
      properties:
        filters:
          $ref: "#/components/schemas/ExportFilters"
        format:
          type: string
          enum: [csv, xlsx, json]
        scope:
          type: string
          enum: [flattened, structured]

    ExportPreviewResponse:
      type: object
      required: [matching_count, can_download, warnings]
      properties:
        matching_count:
          type: integer
        estimated_file_size_bytes:
          type: integer
        can_download:
          type: boolean
        rejection_reason:
          type: string
          nullable: true
        warnings:
          type: array
          items:
            type: string

    ExportDownloadRequest:
      allOf:
        - $ref: "#/components/schemas/ExportPreviewRequest"

    ExportHistoryResponse:
      type: object
      required: [items, total, page, page_size]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ExportRequestRecord"
        total:
          type: integer
        page:
          type: integer
        page_size:
          type: integer

    ExportRequestRecord:
      type: object
      required: [id, dataset, format, scope, status, matching_count, created_at]
      properties:
        id:
          type: string
          format: uuid
        dataset:
          type: string
        format:
          type: string
        scope:
          type: string
        status:
          type: string
        matching_count:
          type: integer
        rejection_reason:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time

    ExportScheduleCreate:
      type: object
      required: [name, filters, format, scope, frequency, email_recipients, next_run_at]
      properties:
        name:
          type: string
        filters:
          $ref: "#/components/schemas/ExportFilters"
        format:
          type: string
          enum: [csv, xlsx, json]
        scope:
          type: string
          enum: [flattened, structured]
        frequency:
          type: string
          enum: [daily, weekly]
        email_recipients:
          type: array
          items:
            type: string
            format: email
        no_data_behavior:
          type: string
          enum: [send_empty_file, send_notice]
          default: send_empty_file
        next_run_at:
          type: string
          format: date-time

    ExportScheduleUpdate:
      type: object
      properties:
        name:
          type: string
        filters:
          $ref: "#/components/schemas/ExportFilters"
        frequency:
          type: string
          enum: [daily, weekly]
        email_recipients:
          type: array
          items:
            type: string
            format: email
        status:
          type: string
          enum: [active, paused, disabled]
        next_run_at:
          type: string
          format: date-time

    ExportSchedule:
      allOf:
        - $ref: "#/components/schemas/ExportScheduleCreate"
        - type: object
          required: [id, status, created_at, updated_at]
          properties:
            id:
              type: string
              format: uuid
            status:
              type: string
              enum: [active, paused, disabled]
            last_run_at:
              type: string
              format: date-time
              nullable: true
            created_at:
              type: string
              format: date-time
            updated_at:
              type: string
              format: date-time

    ExportScheduleListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ExportSchedule"

    ExportDelivery:
      type: object
      required: [id, schedule_id, status, attempt_count, created_at]
      properties:
        id:
          type: string
          format: uuid
        schedule_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [queued, sent, failed]
        attempt_count:
          type: integer
        failure_reason:
          type: string
          nullable: true
        sent_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

    TemplatePackage:
      type: object
      required: [package_version, exported_at, template, pages, elements, checksum]
      properties:
        package_version:
          type: string
        exported_at:
          type: string
          format: date-time
        source_template_id:
          type: string
          format: uuid
        template_lineage_id:
          type: string
          format: uuid
        template:
          type: object
          additionalProperties: true
        pages:
          type: array
          items:
            type: object
            additionalProperties: true
        elements:
          type: array
          items:
            type: object
            additionalProperties: true
        validators:
          type: array
          items:
            type: object
            additionalProperties: true
        conditions:
          type: array
          items:
            type: object
            additionalProperties: true
        reference_bindings:
          type: array
          items:
            type: object
            additionalProperties: true
        checksum:
          type: string

    PackageImportReview:
      type: object
      required: [can_import, import_mode, warnings, remapping_required]
      properties:
        can_import:
          type: boolean
        import_mode:
          type: string
          enum: [new_draft, new_version]
        target_template_id:
          type: string
          format: uuid
          nullable: true
        warnings:
          type: array
          items:
            type: string
        remapping_required:
          type: array
          items:
            type: object
            additionalProperties: true

    PackageImportRequest:
      type: object
      required: [package, remapping]
      properties:
        package:
          $ref: "#/components/schemas/TemplatePackage"
        remapping:
          type: object
          additionalProperties: true

    PackageImportResult:
      type: object
      required: [template_id, version, import_mode, status]
      properties:
        template_id:
          type: string
          format: uuid
        version:
          type: integer
        import_mode:
          type: string
          enum: [new_draft, new_version]
        status:
          type: string

    IntegrationCredentialCreate:
      type: object
      required: [name, scopes]
      properties:
        name:
          type: string
        scopes:
          type: array
          items:
            type: string
        expires_at:
          type: string
          format: date-time
          nullable: true

    IntegrationCredential:
      type: object
      required: [id, name, key_prefix, scopes, status, created_at]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        key_prefix:
          type: string
        scopes:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [active, revoked, expired]
        expires_at:
          type: string
          format: date-time
          nullable: true
        last_used_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

    IntegrationCredentialCreated:
      allOf:
        - $ref: "#/components/schemas/IntegrationCredential"
        - type: object
          required: [secret]
          properties:
            secret:
              type: string
              description: Shown once only

    IntegrationCredentialListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/IntegrationCredential"

    WebhookSubscriptionCreate:
      type: object
      required: [name, event_type, target_url, signing_secret]
      properties:
        name:
          type: string
        event_type:
          type: string
          enum: [form_submitted, form_printed, template_published, batch_completed]
        target_url:
          type: string
          format: uri
        signing_secret:
          type: string
          minLength: 16

    WebhookSubscriptionUpdate:
      type: object
      properties:
        name:
          type: string
        target_url:
          type: string
          format: uri
        signing_secret:
          type: string
          minLength: 16
        status:
          type: string
          enum: [active, paused, disabled]

    WebhookSubscription:
      type: object
      required: [id, name, event_type, target_url, status, created_at]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        event_type:
          type: string
        target_url:
          type: string
        signing_secret_prefix:
          type: string
          nullable: true
        status:
          type: string
          enum: [active, paused, disabled]
        created_at:
          type: string
          format: date-time

    WebhookSubscriptionListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/WebhookSubscription"

    WebhookDelivery:
      type: object
      required: [id, subscription_id, event_type, payload_preview, status, attempt_count, created_at]
      properties:
        id:
          type: string
          format: uuid
        subscription_id:
          type: string
          format: uuid
        event_type:
          type: string
        event_id:
          type: string
          format: uuid
        payload_preview:
          type: object
          additionalProperties: true
        signature_header:
          type: string
        status:
          type: string
          enum: [queued, delivered, failed]
        attempt_count:
          type: integer
        next_retry_at:
          type: string
          format: date-time
          nullable: true
        last_response_code:
          type: integer
          nullable: true
        last_response_body_preview:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time

    WebhookDeliveryListResponse:
      type: object
      required: [items, total, page, page_size]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/WebhookDelivery"
        total:
          type: integer
        page:
          type: integer
        page_size:
          type: integer
