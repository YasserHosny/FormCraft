services:
  backend:
    build:
      context: ./formcraft-backend
    env_file:
      - ./formcraft-backend/.env
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -fsS http://localhost:8000/api/health >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  frontend:
    build:
      context: ./formcraft-frontend
      args:
        - BUILD_ENV=${FRONTEND_BUILD_ENV:-development}
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
